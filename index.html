<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vintage Postcard Maker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@400;700&family=Special+Elite&family=Libre+Baskerville:ital@0;1&family=Pinyon+Script&family=IM+Fell+English:ital@0;1&family=Abril+Fatface&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>✉ Vintage Postcard Maker</h1>
</header>

<main class="app-wrap">

  <!-- LEFT PANEL -->
  <aside class="panel">
    <h2 class="panel-title">Design</h2>

    <section class="section">
      <div class="section-label">Font</div>
      <div class="font-grid" id="fontGrid">
        <button class="font-btn active" data-font="'Playfair Display', serif" style="font-family:'Playfair Display',serif">Playfair</button>
        <button class="font-btn" data-font="'Dancing Script', cursive" style="font-family:'Dancing Script',cursive;font-size:17px">Dancing</button>
        <button class="font-btn" data-font="'Special Elite', cursive" style="font-family:'Special Elite',cursive;font-size:13px">Typewriter</button>
        <button class="font-btn" data-font="'Pinyon Script', cursive" style="font-family:'Pinyon Script',cursive;font-size:18px">Pinyon</button>
        <button class="font-btn" data-font="'IM Fell English', serif" style="font-family:'IM Fell English',serif;font-size:13px">IM Fell</button>
        <button class="font-btn" data-font="'Abril Fatface', cursive" style="font-family:'Abril Fatface',cursive;font-size:13px">Abril</button>
      </div>
    </section>

    <section class="section">
      <div class="section-label">Card color</div>
      <div class="color-row" id="cardColorRow">
        <div class="color-swatch active" style="background:#F5EED5" data-bg="#F5EED5" data-text="#5C3D11" title="Parchment"></div>
        <div class="color-swatch" style="background:#E8D5C4" data-bg="#E8D5C4" data-text="#4A2E1A" title="Blush"></div>
        <div class="color-swatch" style="background:#D6E4D8" data-bg="#D6E4D8" data-text="#2D4A33" title="Sage"></div>
        <div class="color-swatch" style="background:#D4DDE8" data-bg="#D4DDE8" data-text="#1E3A5F" title="Powder Blue"></div>
        <div class="color-swatch" style="background:#E8D8E8" data-bg="#E8D8E8" data-text="#4A1E4A" title="Lavender"></div>
        <div class="color-swatch" style="background:#F0E4C8" data-bg="#F0E4C8" data-text="#6B4C00" title="Honey"></div>
        <div class="color-swatch" style="background:#2C2416" data-bg="#2C2416" data-text="#D4B87A" title="Dark Sepia"></div>
      </div>
    </section>

    <section class="section">
      <div class="section-label">Text color</div>
      <div class="color-row" id="textColorRow">
        <div class="color-swatch active tc" style="background:#5C3D11" data-color="#5C3D11"></div>
        <div class="color-swatch tc" style="background:#8B1A1A" data-color="#8B1A1A"></div>
        <div class="color-swatch tc" style="background:#1A3A5C" data-color="#1A3A5C"></div>
        <div class="color-swatch tc" style="background:#2D4A2D" data-color="#2D4A2D"></div>
        <div class="color-swatch tc" style="background:#4A1E4A" data-color="#4A1E4A"></div>
        <div class="color-swatch tc" style="background:#1A1A1A" data-color="#1A1A1A"></div>
      </div>
    </section>

    <section class="section">
      <div class="section-label">Number of photos</div>
      <div class="photo-slot-grid" id="slotGrid">
        <button class="slot-btn active" data-slots="1">1 photo</button>
        <button class="slot-btn" data-slots="2">2 photos</button>
        <button class="slot-btn" data-slots="3">3 photos</button>
        <button class="slot-btn" data-slots="4">4 photos</button>
      </div>
    </section>

    <section class="section">
      <div class="section-label">Caption</div>
      <input class="small-input" id="captionInput" type="text" placeholder="e.g. Summer 1954 · Paris" value="Summer 1954 · Paris">
    </section>

    <section class="section">
      <div class="section-label">Message (back)</div>
      <textarea class="text-input" id="msgInput" placeholder="Write your message here...">Dearest friend,
Wish you were here!</textarea>
    </section>

    <section class="section">
      <div class="section-label">Address (back)</div>
      <input class="small-input" id="addr1" type="text" placeholder="Name" value="Margaret Hartwell">
      <input class="small-input" id="addr2" type="text" placeholder="Street address" value="14 Rose Lane">
      <input class="small-input" id="addr3" type="text" placeholder="City, ZIP" value="London, W1A 1AA">
    </section>
  </aside>

  <!-- RIGHT: POSTCARD -->
  <div class="postcard-wrap">
    <div class="side-toggle">
      <button class="side-btn active" id="frontBtn">Front</button>
      <button class="side-btn" id="backBtn">Back</button>
    </div>

    <div class="postcard" id="postcard">

      <!-- FRONT -->
      <div class="front-side" id="frontSide">
        <div class="photo-area">
          <div class="photo-grid-1" id="photoGrid"></div>
          <div class="vintage-overlay"></div>
        </div>
        <div class="caption-bar" id="captionBar">
          <span class="caption-text" id="captionText">Summer 1954 · Paris</span>
        </div>
      </div>

      <!-- BACK -->
      <div class="back-side" id="backSide" style="display:none">
        <div class="back-left">
          <div class="postcard-label">POST CARD</div>
          <div class="divider-h"></div>
          <div class="message-area">
            <div id="backMsg" class="back-message"></div>
            <div class="postmark-circle">
              <div>POSTED</div>
              <div class="postmark-year">1954</div>
            </div>
          </div>
        </div>
        <div class="divider-v"></div>
        <div class="back-right">
          <div class="stamp-box"><span>STAMP<br>HERE</span></div>
          <div class="address-lines">
            <div class="addr-line" id="backAddr1">Margaret Hartwell</div>
            <div class="addr-line" id="backAddr2">14 Rose Lane</div>
            <div class="addr-line" id="backAddr3">London, W1A 1AA</div>
          </div>
        </div>
      </div>

    </div>

    <div class="action-row">
      <button class="download-btn" id="downloadBtn">Download Postcard</button>
    </div>
  </div>

</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="app.js"></script>
</body>
</html>
